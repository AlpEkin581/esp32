<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Renkli Cizim</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; padding: 20px; margin: 0; }
        
        /* Çizim alanı ayarları - Dokunmatik engeli kaldırıldı */
        canvas { 
            border: 2px solid #333; 
            background: white; 
            cursor: crosshair; 
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            max-width: 95%; 
            height: auto; 
            display: block;
            margin: 0 auto;
        }

        button { padding: 15px 25px; font-size: 16px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        button#connect { background-color: #4CAF50; color: white; }
        button#clear { background-color: #f44336; color: white; }
        
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
        .color-picker-container { display: flex; align-items: center; gap: 10px; font-size: 18px; }
        input[type="color"] { width: 50px; height: 50px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>ESP32 Renkli Cizim Aracı</h2>
    
    <div class="controls">
        <button id="connect">ESP32'ye Baglan</button>
        <div class="color-picker-container">
            <label>Renk Sec:</label>
            <input type="color" id="colorPicker" value="#ffffff">
        </div>
        <button id="clear">Ekranı Temizle</button>
    </div>

    <canvas id="paintCanvas" width="240" height="240"></canvas>

    <script>
        let char;
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        let painting = false;
        let selectedColor = '#ffffff';

        colorPicker.addEventListener('input', (e) => { selectedColor = e.target.value; });

        // Bluetooth Bağlantısı
        document.getElementById('connect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ESP32' }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                char = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                alert("ESP32'ye Basarıyla Baglandı!");
            } catch (err) { 
                alert("Baglantı Hatası: " + err + "\n\nNot: iPhone kullanıyorsan Bluefy uygulamasını dene!"); 
            }
        });

        // Çizim Fonksiyonu
        function getPos(e) {
            let rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: Math.floor(clientX - rect.left),
                y: Math.floor(clientY - rect.top)
            };
        }

        function start(e) { 
            if (!char) { alert("Once ESP32'ye baglanmalısın!"); return; }
            painting = true; 
            draw(e); 
        }

        function end() { painting = false; }

        function draw(e) {
            if (!painting || !char) return;
            let pos = getPos(e);
            
            ctx.fillStyle = selectedColor;
            ctx.fillRect(pos.x, pos.y, 4, 4); // Ekranda daha net gorunmesi icin 4x4

            let colorCode = getColorCode(selectedColor);
            let data = new TextEncoder().encode(`${pos.x},${pos.y},${colorCode}*`);
            char.writeValue(data).catch(err => console.log(err));
        }

        // Renk Kodları (ESP32 tarafıyla uyumlu)
        function getColorCode(hex) {
            const colors = {
                '#ffffff': 1, '#ff0000': 2, '#00ff00': 3, '#0000ff': 4,
                '#ffff00': 5, '#ff00ff': 6, '#00ffff': 7, '#000000': 8
            };
            return colors[hex.toLowerCase()] || 1;
        }

        // Olay İzleyiciler (PC ve Mobil)
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', end);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, { passive: false });
        canvas.addEventListener('touchend', end);

        // Ekranı Temizleme
        document.getElementById('clear').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(char) char.writeValue(new TextEncoder().encode("C*"));
        });
    </script>
</body>
</html>
